name: PWA Telemetry Privacy Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run PWA telemetry privacy tests with coverage
        run: bun run test:pwa-telemetry:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pwa-telemetry-coverage
          path: coverage/pwa-telemetry
          if-no-files-found: error
          retention-days: 30
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/pwa-telemetry/coverage-summary.json ]; then
            echo "### PWA Telemetry Coverage" >> "$GITHUB_STEP_SUMMARY"
            node -e "const s=require('./coverage/pwa-telemetry/coverage-summary.json').total;console.log('| Metric | % | Covered/Total |\n|---|---|---|\n| Lines | '+s.lines.pct+' | '+s.lines.covered+'/'+s.lines.total+' |\n| Statements | '+s.statements.pct+' | '+s.statements.covered+'/'+s.statements.total+' |\n| Functions | '+s.functions.pct+' | '+s.functions.covered+'/'+s.functions.total+' |\n| Branches | '+s.branches.pct+' | '+s.branches.covered+'/'+s.branches.total+' |')" >> "$GITHUB_STEP_SUMMARY"
          fi

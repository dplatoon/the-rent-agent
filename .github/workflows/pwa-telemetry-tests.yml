name: PWA Telemetry Privacy Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run PWA telemetry privacy tests with coverage
        run: bun run test:pwa-telemetry:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pwa-telemetry-coverage
          path: coverage/pwa-telemetry
          if-no-files-found: error
          retention-days: 30
      - name: Build coverage summary
        if: always()
        id: coverage
        run: |
          if [ -f coverage/pwa-telemetry/coverage-summary.json ]; then
            node -e "const s=require('./coverage/pwa-telemetry/coverage-summary.json').total;console.log('| Metric | % | Covered/Total |\n|---|---|---|\n| Lines | '+s.lines.pct+' | '+s.lines.covered+'/'+s.lines.total+' |\n| Statements | '+s.statements.pct+' | '+s.statements.covered+'/'+s.statements.total+' |\n| Functions | '+s.functions.pct+' | '+s.functions.covered+'/'+s.functions.total+' |\n| Branches | '+s.branches.pct+' | '+s.branches.covered+'/'+s.branches.total+' |')" > coverage-table.md
            {
              echo "### PWA Telemetry Coverage"
              cat coverage-table.md
            } >> "$GITHUB_STEP_SUMMARY"
            {
              echo "body<<EOF"
              echo "<!-- pwa-telemetry-coverage -->"
              echo "### PWA Telemetry Coverage"
              cat coverage-table.md
              echo ""
              echo "_Workflow run: [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})_"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && steps.coverage.outputs.body != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pwa-telemetry-coverage
          message: ${{ steps.coverage.outputs.body }}

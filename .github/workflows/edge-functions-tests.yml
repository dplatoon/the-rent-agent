name: Edge Function Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify required secrets
        run: |
          missing=0
          for v in SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Run edge function tests (with sanitizers)
        timeout-minutes: 20
        env:
          # Per-test default timeout (ms) — generous for slow CI runners
          DENO_TEST_TIMEOUT: "120000"
        run: |
          set +e
          run_tests() {
            deno test \
              --allow-net \
              --allow-env \
              --allow-read \
              --no-check \
              supabase/functions/**/*.test.ts supabase/functions/**/*_test.ts
          }

          run_tests
          status=$?

          if [ "$status" -ne 0 ]; then
            echo "::warning::First test run failed (exit $status). Retrying once to absorb transient timeouts / runner slowness."
            sleep 5
            run_tests
            status=$?
          fi

          exit "$status"

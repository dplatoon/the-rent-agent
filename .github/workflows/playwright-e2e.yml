name: Playwright E2E

on:
  push:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL || 'https://the-rent-agent.lovable.app' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        run: bunx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.PLAYWRIGHT_BASE_URL }}

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload Playwright traces (shard ${{ matrix.shard }})
        if: always()
        id: upload-traces
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-shard-${{ matrix.shard }}
          path: test-results/**/trace*.zip
          if-no-files-found: ignore
          retention-days: 14

      - name: Print trace links
        if: always() && steps.upload-traces.outputs.artifact-url != ''
        run: |
          echo "::notice title=Playwright traces (shard ${{ matrix.shard }})::Download: ${{ steps.upload-traces.outputs.artifact-url }}"
          echo "### Playwright traces — shard ${{ matrix.shard }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Download trace artifact](${{ steps.upload-traces.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- Open with: \`bunx playwright show-trace <path-to-trace.zip>\` or drop the zip into https://trace.playwright.dev" >> "$GITHUB_STEP_SUMMARY"
          {
            echo ""
            echo "**Trace files in this shard:**"
            find test-results -name 'trace*.zip' 2>/dev/null | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

  merge-reports:
    if: always()
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        run: bunx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 30
